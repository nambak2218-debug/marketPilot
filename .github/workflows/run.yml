name: MarketPilot V5 Final

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "실행 모드"
        required: true
        default: "alert"
        type: choice
        options:
          - alert
          - evaluate
          - monthly_report
  schedule:
    # GitHub cron은 UTC 기준입니다.
    - cron: "35 22 * * 0-4"  # KST 평일 07:35 (장 시작 09:00까지 85분 여유)
    - cron: "10 0 * * 1-5"   # KST 평일 09:10
    - cron: "30 2 * * 1-5"   # KST 평일 11:30
    - cron: "10 5 * * 1-5"   # KST 평일 14:10
    - cron: "55 5 * * 1-5"   # KST 평일 14:55 (마감 직전, 기존 15:15에서 20분 당김)
    - cron: "40 6 * * 1-5"   # KST 평일 15:40 당일 성과 평가
    - cron: "0 7 1 * *"      # KST 매월 1일 16:00 전월 보고서

permissions:
  contents: write

concurrency:
  group: marketpilot-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install --disable-pip-version-check -r requirements.txt
          python -c "import reportlab, exchange_calendars; print('dependencies OK')"

      - name: Resolve run mode
        id: mode
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "40 6 * * 1-5" ]; then
            echo "value=evaluate" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 7 1 * *" ]; then
            echo "value=monthly_report" >> "$GITHUB_OUTPUT"
          else
            echo "value=alert" >> "$GITHUB_OUTPUT"
          fi

      - name: Run MarketPilot
        env:
          TZ: Asia/Seoul
          PYTHONUNBUFFERED: "1"
          RUN_MODE: ${{ steps.mode.outputs.value }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_BASE_URL: ${{ secrets.KIS_BASE_URL }}
          KIS_FUTURES_CODE: ${{ secrets.KIS_FUTURES_CODE }}
          KIS_NIGHT_FUTURES_CODE: ${{ secrets.KIS_NIGHT_FUTURES_CODE }}
          SUPPLY_STRONG_THRESHOLD_MKRW: "100000"
          PROGRAM_STRONG_THRESHOLD_MKRW: "50000"
        run: python app.py

      - name: Commit accumulated history
        if: always() && steps.mode.outputs.value != 'monthly_report'
        shell: bash
        run: |
          git config user.name "marketpilot-bot"
          git config user.email "marketpilot-bot@users.noreply.github.com"
          git add data/signal_history.csv
          if git diff --cached --quiet; then
            echo "No history changes"
            exit 0
          fi
          git commit -m "Update MarketPilot signal history [skip ci]"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Upload monthly report artifact
        if: steps.mode.outputs.value == 'monthly_report'
        uses: actions/upload-artifact@v4
        with:
          name: marketpilot-monthly-report
          path: reports/*
          if-no-files-found: warn
          retention-days: 90
